name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write # Required for pages configuration
      id-token: write # Required for pages configuration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci
          npm list gh-pages || npm install --save-dev gh-pages

      - name: Build
        working-directory: ./frontend
        env:
          CI: false
          PUBLIC_URL: "https://code-clarity.insitechinternational.com"
        run: |
          echo "REACT_APP_BASE_URL=https://code-clarity.insitechinternational.com" > .env
          npm run build

      - name: Prepare deployment
        working-directory: ./frontend
        run: |
          cd build
          echo "code-clarity.insitechinternational.com" > CNAME
          touch .nojekyll
          cp index.html 404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "Deploy to GitHub Pages"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
          source: gh-pages
          branch: gh-pages

      - name: Wait for branch creation
        run: |
          echo "Waiting for gh-pages branch to be created..."
          sleep 30  # Give GitHub some time to process

      - name: Verify deployment
        run: |
          if git ls-remote --heads origin gh-pages > /dev/null; then
            echo "gh-pages branch exists and is ready"
          else
            echo "Error: gh-pages branch was not created"
            exit 1
          fi
