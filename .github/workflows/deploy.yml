# Deploy.yml

name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci

      - name: Build project
        working-directory: ./frontend
        run: |
          CI=false npm run build
          echo "Build completed. Contents of build directory:"
          ls -la build/

      - name: Prepare deployment
        working-directory: ./frontend
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "ERROR: index.html is missing!"
            exit 1
          fi
          # Create CNAME file
          echo "code-clarity.insitechinternational.com" > build/CNAME
          # Create .nojekyll file
          touch build/.nojekyll
          # Copy index.html to 404.html to handle client-side routing
          cp build/index.html build/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          cname: code-clarity.insitechinternational.com
