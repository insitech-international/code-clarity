name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm ci
          npm list react-router-dom

      - name: Build project
        working-directory: ./frontend
        run: |
          CI=false npm run build
          echo "Build completed. Contents of build directory:"
          ls -la build/
          echo "Contents of build/static directory:"
          ls -la build/static || echo "No static directory found"

      - name: Check build artifacts
        working-directory: ./frontend
        run: |
          echo "Checking critical files..."
          for file in build/index.html build/404.html build/static; do
            if [ -e "$file" ]; then
              echo "✅ $file exists"
            else
              echo "❌ $file is missing"
            fi
          done

          echo "Contents of index.html:"
          head -n 20 build/index.html

      - name: Prepare deployment
        working-directory: ./frontend
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "ERROR: index.html is missing!"
            exit 1
          fi
          echo "code-clarity.insitechinternational.com" > build/CNAME
          touch build/.nojekyll
          cp build/index.html build/404.html
          echo "Deployment files prepared:"
          ls -la build/
          echo "CNAME contents:"
          cat build/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          cname: code-clarity.insitechinternational.com

      - name: Verify deployment
        run: |
          echo "Waiting for GitHub Pages deployment..."
          sleep 30
          curl -I https://code-clarity.insitechinternational.com || echo "Site not accessible yet - may need more time for DNS propagation"
