name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Debug - Check Git Status
        run: |
          echo "Current branch:"
          git branch --show-current
          echo "\nAll branches:"
          git branch -a
          echo "\nLast commit:"
          git log -1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Clean Install
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install

      - name: Build project
        working-directory: ./frontend
        run: |
          echo "Starting build process..."
          npm run build
          echo "Build completed. Contents of build directory:"
          ls -la build/
        env:
          CI: false
          PUBLIC_URL: "https://code-clarity.insitechinternational.com"

      - name: Verify Build Output
        working-directory: ./frontend
        run: |
          if [ ! -f "build/index.html" ]; then
            echo "Error: index.html not found!"
            echo "Contents of current directory:"
            ls -la
            echo "\nContents of build directory (if it exists):"
            ls -la build/ || echo "build directory not found"
            exit 1
          fi
          echo "Build verification successful - index.html found"
          echo "Contents of index.html:"
          head -n 20 build/index.html

      - name: Prepare deployment
        working-directory: ./frontend
        run: |
          echo "code-clarity.insitechinternational.com" > build/CNAME
          touch build/.nojekyll
          cp build/index.html build/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/build
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
          cname: code-clarity.insitechinternational.com
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: Verify Deployment
        run: |
          # Wait for GitHub Pages to deploy
          sleep 30
          echo "Checking deployment..."
          git fetch origin gh-pages
          git checkout gh-pages
          if [ ! -f "index.html" ]; then
            echo "Error: index.html not found in gh-pages branch!"
            ls -la
            exit 1
          fi
          echo "Deployment verification successful"